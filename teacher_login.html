<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Login & Registration</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:#050505;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    background:#111;
    border-radius:12px;
    box-shadow:0 0 25px rgba(0,255,255,.2);
    position:relative;
    overflow:hidden;
    width:800px;
    max-width:100%;
    min-height:520px;
    border:1px solid rgba(0,255,255,.3);
}

.form-container{
    position:absolute;
    top:0;
    height:100%;
    width:50%;
    transition:all .6s ease-in-out;
}

.sign-in-container{ left:0; z-index:2; }
.sign-up-container{ left:0; opacity:0; z-index:1; }

.container.right-panel-active .sign-in-container{
    transform:translateX(100%);
    opacity:0;
}

.container.right-panel-active .sign-up-container{
    transform:translateX(100%);
    opacity:1;
    z-index:5;
}

form{
    background:#111;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:0 50px;
    height:100%;
    text-align:center;
}

h1{ margin-bottom:20px; }

.input-group{
    position:relative;
    width:100%;
    margin:10px 0;
}

.input-group i{
    position:absolute;
    left:15px;
    top:14px;
    color:#555;
}

input{
    width:100%;
    padding:12px 15px 12px 40px;
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:8px;
    color:white;
}

button{
    margin-top:20px;
    padding:12px 50px;
    border:none;
    border-radius:25px;
    background:linear-gradient(to right,#008080,#00ffff);
    font-weight:bold;
    cursor:pointer;
}

span{
    margin-top:20px;
    font-size:14px;
    color:#888;
}

b{
    color:#00ffff;
    cursor:pointer;
    text-decoration:underline;
}

.error{
    background:rgba(255,0,0,.15);
    border:1px solid rgba(255,0,0,.4);
    padding:8px;
    width:100%;
    border-radius:6px;
    margin-bottom:10px;
}

.overlay-container{
    position:absolute;
    top:0;
    left:50%;
    width:50%;
    height:100%;
    overflow:hidden;
    transition:transform .6s ease-in-out;
    z-index:100;
}

.container.right-panel-active .overlay-container{
    transform:translateX(-100%);
}

.overlay{
    background:linear-gradient(135deg,#002222,#004d4d);
    position:relative;
    left:-100%;
    height:100%;
    width:200%;
    transition:transform .6s ease-in-out;
}

.container.right-panel-active .overlay{
    transform:translateX(50%);
}

.overlay-panel{
    position:absolute;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:0 40px;
    height:100%;
    width:50%;
}

.overlay-right{ right:0; }
</style>
</head>

<body>

<div class="container" id="container">

    <!-- TEACHER REGISTER -->
    <div class="form-container sign-up-container">
        <form method="POST" action="/teacher/register">
            <h1>Teacher Register</h1>

            <div class="input-group">
                <i class="fa fa-user"></i>
                <input type="text" name="name" placeholder="Full Name" required>
            </div>

            <div class="input-group">
                <i class="fa fa-book"></i>
                <input type="text" name="subject" placeholder="Subject" required>
            </div>

            <div class="input-group">
                <i class="fa fa-user-circle"></i>
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <i class="fa fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit">Register</button>
            <span>Already registered? <b id="signIn">Sign In</b></span>
        </form>
    </div>

    <!-- TEACHER LOGIN -->
    <div class="form-container sign-in-container">
        <form method="POST" action="/teacher/login">
            <h1>Teacher Login</h1>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <div class="input-group">
                <i class="fa fa-user"></i>
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <i class="fa fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit">Login</button>
            <span>New teacher? <b id="signUp">Register</b></span>
        </form>
    </div>

    <!-- OVERLAY -->
    <div class="overlay-container">
        <div class="overlay">
            <div class="overlay-panel overlay-left">
                <h1>WELCOME TEACHER</h1>
                <p>Create your account to manage students.</p>
            </div>
            <div class="overlay-panel overlay-right">
                <h1>WELCOME BACK</h1>
                <p>Login to access teacher dashboard.</p>
            </div>
        </div>
    </div>

</div>

<script>
const signUp = document.getElementById("signUp");
const signIn = document.getElementById("signIn");
const container = document.getElementById("container");

signUp.onclick = () => container.classList.add("right-panel-active");
signIn.onclick = () => container.classList.remove("right-panel-active");
</script>

</body>
</html>
