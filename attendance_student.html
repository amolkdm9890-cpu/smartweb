<!DOCTYPE html>
<html>
<head>
    <title>My Attendance</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f9fafc;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        th, td {
            border: 1px solid #e0e0e0;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #3498db;
            color: #fff;
            font-weight: 600;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #f1f7fd;
        }

        /* Download button */
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            font-size: 15px;
            font-weight: 500;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        .btn-primary {
            background-color: #3498db;
            color: #fff;
            border: none;
        }

        .btn-primary:hover {
            background-color: #2980b9;
        }

        p {
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Your Attendance Records</h2>
    <table>
        <tr>
            <th>Subject</th>
            <th>Lecture</th>
            <th>Status</th>
            <th>Date</th>
        </tr>
        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
        </tr>
        {% endfor %}
    </table>

    <!-- Download button -->
    <p>
        <a href="/download_student_attendance_pdf" class="btn btn-primary">Download My Attendance PDF</a>
    </p>
</body>
</html>
