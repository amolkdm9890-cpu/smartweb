<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #1f2937;
        }

        .dashboard {
            width: 90%;
            max-width: 850px;
            background: #ffffff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            padding: 28px;
            background: #2563eb;
            color: #ffffff;
        }

        .header h2 {
            font-size: 26px;
            font-weight: 700;
        }

        .header span {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-box {
            padding: 18px;
            background: #f8fafc;
            border-radius: 10px;
            border-left: 4px solid #2563eb;
        }

        .info-box label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #6b7280;
        }

        .info-box p {
            font-size: 16px;
            font-weight: 600;
            color: #111827;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
        }

        .btn {
            padding: 14px;
            text-align: center;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-primary {
            background: #2563eb;
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #1e40af;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #10b981;
            color: #ffffff;
        }

        .btn-secondary:hover {
            background: #047857;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ef4444;
            color: #ffffff;
        }

        .btn-danger:hover {
            background: #b91c1c;
            transform: translateY(-2px);
        }

        footer {
            padding: 15px;
            text-align: center;
            font-size: 13px;
            color: #6b7280;
            background: #f1f5f9;
        }
    </style>
</head>
<body>

    <div class="dashboard">

        <div class="header">
            <h2>Welcome, {{ student[0] }}</h2>
            <span>Student Dashboard</span>
        </div>

        <div class="content">
            <div class="info-grid">
                <div class="info-box">
                    <label>Roll Number</label>
                    <p>{{ student[1] }}</p>
                </div>

                <div class="info-box">
                    <label>Semester</label>
                    <p>{{ student[2] }}</p>
                </div>

                <div class="info-box">
                    <label>Username</label>
                    <p>{{ student[3] }}</p>
                </div>
            </div>

            <div class="actions">
                <a href="/view_marks" class="btn btn-primary">📄 View Marksheet</a>
                <a href="/view_attendance" class="btn btn-secondary">📅 View Attendance</a>
                <a href="/student/analysis" class="btn btn-primary">📊 Student Analysis</a>
               

                <a href="/logout" class="btn btn-danger" onclick="return confirmLogout()">🚪 Logout</a>
            </div>
        </div>

        <footer>
            © 2025 BCS Knowledge Portal | Student Panel
        </footer>

    </div>

    <script>
        function confirmLogout() {
            return confirm("Are you sure you want to logout?");
        }
    </script>

</body>
</html>
